name: Flet Web Build + Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      # Solo necesario para web (Flet usa Flutter Web)
      - name: Setup Flutter (via FVM if exists)
        if: hashFiles('.fvmrc') != ''
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: ".fvmrc"
          cache: true

      - name: Build web app
        shell: bash
        run: |
          uv run flet build web \
            --verbose \
            --base-url ${GITHUB_REPOSITORY#*/} \
            --route-url-strategy hash \
            --build-number ${{ github.run_number }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
