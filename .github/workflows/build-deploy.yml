name: Web Build + Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    name: Build web app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1️⃣ Instalar Python correctamente
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 2️⃣ Instalar uv
      - uses: astral-sh/setup-uv@v6

      # 3️⃣ Crear entorno virtual
      - name: Create virtual environment
        run: uv venv

      # 4️⃣ Instalar Flet dentro del venv
      - name: Install dependencies
        run: uv pip install flet==0.28.3

      # 5️⃣ Build web
      - name: Build app
        run: uv run flet build web --base-url ${GITHUB_REPOSITORY#*/} --route-url-strategy hash

      # 6️⃣ Subir artifact
      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
